<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PCR Input System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="topbar">
        <h1>PATIENT CARE REPORT</h1>
        <nav>
            <a href="{{ url_for('records') }}">Dashboard</a>
            <a href="{{ url_for('new_pcr') }}">New PCR</a>
            <a href="{{ url_for('export_records_csv') }}">Export CSV</a>
            <details class="nav-export-dropdown">
                <summary>Export XLSX</summary>
                <form method="get" action="{{ url_for('export_records_xlsx') }}" class="nav-export-form">
                    <select name="page" aria-label="Select XLSX export range" required>
                        <option value="" selected disabled>Select range</option>
                        {% for export_range in export_ranges %}
                        <option value="{{ export_range['page'] }}">{{ export_range['label'] }}</option>
                        {% endfor %}
                    </select>
                    <button type="submit" {% if not export_ranges %}disabled{% endif %}>Download</button>
                </form>
            </details>
            <a href="{{ url_for('export_records_db') }}">Backup DB</a>
        </nav>
    </header>

    <main class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
