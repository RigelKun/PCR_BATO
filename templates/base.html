<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PCR Input System</title>
    <meta name="theme-color" content="#0e7490">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="PCR Input">
    <link rel="manifest" href="{{ url_for('webmanifest') }}">
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/mdrrmo.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='images/mdrrmo.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="topbar navbar navbar-light bg-white border-bottom shadow-sm px-3 py-2">
        <div class="container-fluid px-0">
            <h1 class="navbar-brand m-0">PATIENT CARE REPORT</h1>
            <nav class="d-flex flex-wrap align-items-center gap-2">
                <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('records') }}">Dashboard</a>
                <a class="btn btn-primary btn-sm" href="{{ url_for('new_pcr') }}">New PCR</a>
                <a class="btn btn-outline-primary btn-sm" href="{{ url_for('export_records_csv') }}">Export CSV</a>
            <details class="nav-export-dropdown">
                <summary class="btn btn-outline-primary btn-sm mb-0">Export XLSX</summary>
                <form method="get" action="{{ url_for('export_records_xlsx') }}" class="nav-export-form">
                    <select class="form-select form-select-sm" name="page" aria-label="Select XLSX export range" required>
                        <option value="" selected disabled>Select range</option>
                        {% for export_range in export_ranges %}
                        <option value="{{ export_range['page'] }}">{{ export_range['label'] }}</option>
                        {% endfor %}
                    </select>
                    <button class="btn btn-primary btn-sm" type="submit" {% if not export_ranges %}disabled{% endif %}>Download</button>
                </form>
            </details>
                <a class="btn btn-outline-dark btn-sm" href="{{ url_for('export_records_db') }}">Backup DB</a>
            </nav>
        </div>
    </header>

    <main class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert {% if category == 'success' %}alert-success{% elif category == 'error' %}alert-danger{% else %}alert-info{% endif %}" role="alert">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"
    ></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('{{ url_for('service_worker') }}');
            });
        }
    </script>
</body>
</html>
